server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend (strips the /api prefix)
    location /api/ {
        proxy_pass http://api:8000/;
    }

}
